<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
<title>Contacto - Arturo Daniel Meixueiro Cruz</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100;200;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="css/styles.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="d-flex flex-column">
<main class="flex-shrink-0">
<nav class="navbar navbar-expand-lg navbar-light bg-white py-3">
<div class="container px-5">
<a class="navbar-brand" href="index.html"><span class="fw-bolder text-primary">PORTAFOLIO</span></a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
<div class="collapse navbar-collapse" id="navbarSupportedContent">
<ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
<li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
<li class="nav-item"><a class="nav-link" href="resume.html">Currículum</a></li>
<li class="nav-item"><a class="nav-link" href="projects.html">Proyectos</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contacto</a></li>
</ul>
</div>
</div>
</nav>
<section class="py-5">
<div class="container px-5">
<div class="bg-light rounded-4 py-5 px-4 px-md-5">
<div class="text-center mb-5">
<div class="feature bg-primary bg-gradient-primary-to-secondary text-white rounded-3 mb-3"><i class="bi bi-envelope"></i></div>
<h1 class="fw-bolder">Ponte en contacto</h1>
<p class="lead fw-normal text-muted mb-0">¡Trabajemos juntos!</p>
</div>
<div class="row gx-5 justify-content-center">
<div class="col-lg-8 col-xl-6">
<form id="contactForm">
<div class="form-floating mb-3">
<input class="form-control" id="name" type="text" placeholder="Introduce tu nombre..."/>
<label for="name">Nombre completo</label>
</div>
<div class="form-floating mb-3">
<input class="form-control" id="email" type="email" placeholder="nombre@ejemplo.com"/>
<label for="email">Correo electrónico</label>
</div>
<div class="form-floating mb-3">
<input class="form-control" id="phone" type="tel" placeholder="(123) 456-7890"/>
<label for="phone">Número de teléfono</label>
</div>
<div class="form-floating mb-3">
<textarea class="form-control" id="message" placeholder="Escribe tu mensaje aquí..." style="height:10rem"></textarea>
<label for="message">Mensaje</label>
</div>
<div class="d-grid"><button class="btn btn-primary btn-lg" id="submitButton" type="submit">Enviar</button></div>
</form>
</div>
</div>
</div>
</div>
</section>
</main>
<footer class="bg-white py-4 mt-auto">
<div class="container px-5">
<div class="row align-items-center justify-content-between flex-column flex-sm-row">
</div>
</div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/scripts.js"></script>
<script>
document.getElementById('contactForm').addEventListener('submit',function(event){
event.preventDefault();
var name=document.getElementById('name').value;
var email=document.getElementById('email').value;
var phone=document.getElementById('phone').value;
var message=document.getElementById('message').value;
if(name===''||email===''||phone===''||message===''){
Swal.fire({
icon:'error',
title:'Error',
text:'RELLENE TODOS LOS CAMPOS',
confirmButtonColor:'#e21e80'
});
}else{
Swal.fire({
icon:'success',
title:'¡Enviado!',
text:'GRACIAS, USTED SERA ATENDIDO PRONTO',
confirmButtonColor:'#1e30f3'
}).then((result)=>{
if(result.isConfirmed){
document.getElementById('contactForm').reset();
}
});
}
});
</script>
</body>
</html>
